# models.lock
#
# Pin Qwen-Image 2512 full-bf16 model files to specific Hugging Face
# revisions. `scripts/populate_volume.py` reads this file to hydrate the
# RunPod Network Volume mounted at /runpod-volume.
#
# On first hydration, replace every TBD-on-first-download sha256 with the
# value printed by the populate script, set `bytes` to the real size, and
# consider pinning `revision` to a commit SHA instead of "main".

[[model]]
kind     = "diffusion_models"
repo     = "Comfy-Org/Qwen-Image_ComfyUI"
revision = "main"
path     = "split_files/diffusion_models/qwen_image_2512_bf16.safetensors"
dest     = "models/diffusion_models/qwen_image_2512_bf16.safetensors"
bytes    = 40861031488
sha256   = "cbf55390fff27dbc785046d7007b04e0c5dd7421e7ef128f2831eacb53a8e075"

[[model]]
kind     = "text_encoders"
repo     = "Comfy-Org/Qwen-Image_ComfyUI"
revision = "main"
path     = "split_files/text_encoders/qwen_2.5_vl_7b.safetensors"
dest     = "models/text_encoders/qwen_2.5_vl_7b.safetensors"
bytes    = 16584415576
sha256   = "cfafd739459bc86257397259f612a9aee88e5b98e85b5c0d0d1717e898b3463a"

